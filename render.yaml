services:
  # 1. Backend Web Service (FastAPI)
  - type: web
    name: fiq-backend-test
    runtime: python
    buildCommand: "pip install -r backend/requirements.txt"
    preDeployCommand: "cd backend && alembic upgrade head && python -m app.core.seed"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: S3_ENDPOINT
        value: https://wwcxwljepwqumqiwvknd.storage.supabase.co/storage/v1/s3
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_BUCKET_NAME
        value: fiq-recursos
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: '["https://fiq-frontend-test.onrender.com"]'
      - key: VITE_API_URL
        value: https://fiq-backend-test.onrender.com

  # 2. Frontend Static Site (React Vite)
  - type: web
    name: fiq-frontend-test
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "frontend/dist"
    envVars:
      - key: VITE_API_URL
        value: https://fiq-backend-test.onrender.com
