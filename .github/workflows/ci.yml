name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      # We spin up auxiliary services via standard GitHub Action service containers
      # or docker-compose to match the project's exact docker-compose ports.
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: fiq
          POSTGRES_PASSWORD: fiq123
          POSTGRES_DB: fiq_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U fiq -d fiq_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      minio:
        image: minio/minio:latest
        ports:
          - 9000:9000
          - 9001:9001
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        options: >-
          server /data --console-address ":9001"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql://fiq:fiq123@localhost:5433/fiq_db
          REDIS_URL: redis://localhost:6379/0
          S3_ENDPOINT: http://localhost:9000
          S3_ACCESS_KEY: minioadmin
          S3_SECRET_KEY: minioadmin
          S3_BUCKET_NAME: fiq-recursos
          SECRET_KEY: dev-secret-key-change-in-production
        run: |
          cd backend
          uv run pytest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '26'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint frontend
        run: |
          cd frontend
          npm run lint

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Install Playwright Browsers
        run: |
          cd frontend
          npx playwright install --with-deps

      - name: Start FastAPI Backend in Background
        env:
          DATABASE_URL: postgresql://fiq:fiq123@localhost:5433/fiq_db
          REDIS_URL: redis://localhost:6379/0
          S3_ENDPOINT: http://localhost:9000
          S3_ACCESS_KEY: minioadmin
          S3_SECRET_KEY: minioadmin
          S3_BUCKET_NAME: fiq-recursos
          SECRET_KEY: dev-secret-key-change-in-production
        run: |
          cd backend
          # Run database migrations
          uv run alembic upgrade head
          # Start server in background
          uv run uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          # Wait for backend to be ready
          for i in {1..10}; do
            curl -s http://localhost:8000/health && break || sleep 2
          done

      - name: Run E2E Playwright tests
        env:
          DATABASE_URL: postgresql://fiq:fiq123@localhost:5433/fiq_db
          REDIS_URL: redis://localhost:6379/0
          S3_ENDPOINT: http://localhost:9000
          S3_ACCESS_KEY: minioadmin
          S3_SECRET_KEY: minioadmin
          S3_BUCKET_NAME: fiq-recursos
          SECRET_KEY: dev-secret-key-change-in-production
        run: |
          cd frontend
          # Playwright will automatically start 'npm run dev' via its config
          npx playwright test
