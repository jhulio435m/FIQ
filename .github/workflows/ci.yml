name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Start Docker Compose Services
        run: |
          # Start Postgres, Redis, and MinIO in the background
          docker compose up -d postgres redis minio
          
          # Wait for Postgres to be healthy
          echo "Waiting for Postgres..."
          for i in {1..30}; do
            docker compose exec -T postgres pg_isready -U fiq -d fiq_db && break
            sleep 2
          done

          # Wait for Minio to be healthy
          echo "Waiting for Minio..."
          for i in {1..30}; do
            curl -s http://localhost:9000/minio/health/ready && break
            sleep 2
          done

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: false

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql://fiq:fiq123@localhost:5433/fiq_db
          REDIS_URL: redis://localhost:6379/0
          S3_ENDPOINT: http://localhost:9000
          S3_ACCESS_KEY: minioadmin
          S3_SECRET_KEY: minioadmin
          S3_BUCKET_NAME: fiq-recursos
          SECRET_KEY: dev-secret-key-change-in-production
        run: |
          cd backend
          uv run --extra dev pytest

      - name: Check OpenAPI documentation alignment
        run: |
          cd backend
          uv run python scripts/check_openapi_docs.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '26'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint frontend
        run: |
          cd frontend
          npm run lint

      - name: Run frontend unit tests
        run: |
          cd frontend
          npm run test:unit

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Build Docker Compose stack
        run: docker compose build

      - name: Install Playwright Browsers
        run: |
          cd frontend
          npx playwright install --with-deps

      - name: Start FastAPI Backend in Background
        env:
          DATABASE_URL: postgresql://fiq:fiq123@localhost:5433/fiq_db
          REDIS_URL: redis://localhost:6379/0
          S3_ENDPOINT: http://localhost:9000
          S3_ACCESS_KEY: minioadmin
          S3_SECRET_KEY: minioadmin
          S3_BUCKET_NAME: fiq-recursos
          SECRET_KEY: dev-secret-key-change-in-production
        run: |
          cd backend
          # Run database migrations
          uv run alembic upgrade head
          # Seed database
          uv run python -m app.core.seed
          # Start server in background
          uv run uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          # Wait for backend to be ready
          for i in {1..10}; do
            curl -s http://localhost:8000/health && break || sleep 2
          done

      - name: Run E2E Playwright tests
        env:
          DATABASE_URL: postgresql://fiq:fiq123@localhost:5433/fiq_db
          REDIS_URL: redis://localhost:6379/0
          S3_ENDPOINT: http://localhost:9000
          S3_ACCESS_KEY: minioadmin
          S3_SECRET_KEY: minioadmin
          S3_BUCKET_NAME: fiq-recursos
          SECRET_KEY: dev-secret-key-change-in-production
        run: |
          cd frontend
          # Playwright will automatically start 'npm run dev' via its config
          npx playwright test

      - name: Stop Docker Compose Services
        if: always()
        run: |
          docker compose down

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-failure-artifacts
          path: |
            frontend/playwright-report/
            frontend/test-results/
            frontend/coverage/
