apiVersion: v1
kind: Secret
metadata:
  name: fiq-secrets
  namespace: fiq
type: Opaque
stringData:
  DATABASE_URL: postgresql://USER:PASSWORD@postgres-ha:5432/fiq_db
  MONGO_URL: mongodb://USER:PASSWORD@mongo-rs:27017/fiq_events?replicaSet=fiq-rs&authSource=admin
  SECRET_KEY: replace-with-32-plus-byte-secret
  DASHBOARD_API_KEY: replace-with-dashboard-api-key
  S3_ENDPOINT: https://s3.example.edu.pe
  S3_ACCESS_KEY: replace-with-s3-access-key
  S3_SECRET_KEY: replace-with-s3-secret-key
