version: '3.8'

services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.12
    restart: always
    environment:
      - ETCD_NAME=etcd-1
      - ETCD_DATA_DIR=/etcd-data
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://10.77.0.3:2380
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://10.77.0.3:2379
      - ETCD_INITIAL_CLUSTER_TOKEN=fiq-etcd-cluster
      - ETCD_INITIAL_CLUSTER=etcd-1=http://10.77.0.3:2380,etcd-2=http://10.77.0.2:2380,etcd-3=http://10.77.0.1:2380
      - ETCD_INITIAL_CLUSTER_STATE=existing
    ports:
      - "10.77.0.3:2379:2379"
      - "10.77.0.3:2380:2380"
    volumes:
      - etcd_data:/etcd-data

  patroni:
    build:
      context: ./ha-database
      dockerfile: Dockerfile.patroni
    restart: always
    environment:
      - PATRONI_NAME=node-1
      - PATRONI_ETCD3_HOSTS=10.77.0.3:2379,10.77.0.2:2379,10.77.0.1:2379
      - PATRONI_POSTGRESQL_CONNECT_ADDRESS=10.77.0.3:5432
      - PATRONI_POSTGRESQL_LISTEN=0.0.0.0:5432
      - PATRONI_RESTAPI_CONNECT_ADDRESS=10.77.0.3:8008
      - PATRONI_RESTAPI_LISTEN=0.0.0.0:8008
      - PATRONI_SUPERUSER_PASSWORD=41209329b778fd9f7d79f064
      - PATRONI_REPLICATION_PASSWORD=3a42cc1189eafad100ff6e3a
    ports:
      - "10.77.0.3:5432:5432"
      - "10.77.0.3:8008:8008"
    volumes:
      - patroni_data:/home/postgres/pgdata
      - ./ha-database/patroni.yml:/patroni.yml:ro
    depends_on:
      - etcd

  haproxy:
    image: haproxy:2.8-alpine
    restart: always
    environment:
      - NODE1_IP=10.77.0.3
      - NODE2_IP=10.77.0.2
      - NODE3_IP=10.77.0.1
    volumes:
      - ./ha-database/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "10.77.0.3:5000:5000" # PostgreSQL Read/Write (Master)
      - "10.77.0.3:5001:5001" # PostgreSQL Read-Only (Replicas)
      - "10.77.0.3:7000:7000" # HAProxy Stats Dashboard
    depends_on:
      - patroni

volumes:
  etcd_data:
  patroni_data:

networks:
  default:
    external: true
    name: fiq-network
