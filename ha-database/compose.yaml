services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.12
    restart: unless-stopped
    network_mode: host
    command:
      - /usr/local/bin/etcd
    environment:
      ETCD_NAME: ${ETCD_NAME}
      ETCD_DATA_DIR: /etcd-data
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://${NODE_IP}:2380
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://${NODE_IP}:2379
      ETCD_INITIAL_CLUSTER_TOKEN: ${ETCD_INITIAL_CLUSTER_TOKEN:-fiq-etcd-cluster}
      ETCD_INITIAL_CLUSTER: ${ETCD_INITIAL_CLUSTER}
      ETCD_INITIAL_CLUSTER_STATE: ${ETCD_INITIAL_CLUSTER_STATE:-new}
      ETCD_ENABLE_V2: "true"
    volumes:
      - etcd_data:/etcd-data

  patroni:
    build:
      context: .
      dockerfile: Dockerfile.patroni
    restart: unless-stopped
    network_mode: host
    environment:
      PATRONI_NAME: ${PATRONI_NAME}
      PATRONI_SCOPE: ${PATRONI_SCOPE:-fiq-postgres}
      PATRONI_NAMESPACE: /service/
      PATRONI_ETCD_HOSTS: ${PATRONI_ETCD_HOSTS}
      PATRONI_RESTAPI_LISTEN: 0.0.0.0:8008
      PATRONI_RESTAPI_CONNECT_ADDRESS: ${NODE_IP}:8008
      PATRONI_POSTGRESQL_LISTEN: 0.0.0.0:5432
      PATRONI_POSTGRESQL_CONNECT_ADDRESS: ${NODE_IP}:5432
      PATRONI_SUPERUSER_USERNAME: postgres
      PATRONI_SUPERUSER_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD}
      PATRONI_REPLICATION_USERNAME: replicator
      PATRONI_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD}
      PATRONI_REWIND_USERNAME: rewind_user
      PATRONI_REWIND_PASSWORD: ${POSTGRES_REWIND_PASSWORD}
    volumes:
      - patroni_data:/home/postgres/pgdata
      - ./patroni.yml:/patroni.yml:ro
    depends_on:
      - etcd

  haproxy:
    image: haproxy:2.9-alpine
    restart: unless-stopped
    network_mode: host
    environment:
      NODE1_IP: ${NODE1_IP}
      NODE2_IP: ${NODE2_IP}
      NODE3_IP: ${NODE3_IP}
    entrypoint: ["/usr/local/bin/render-haproxy.sh"]
    volumes:
      - ./haproxy.cfg.tpl:/usr/local/etc/haproxy/haproxy.cfg.tpl:ro
      - ./render-haproxy.sh:/usr/local/bin/render-haproxy.sh:ro
    depends_on:
      - patroni

volumes:
  etcd_data:
  patroni_data:
