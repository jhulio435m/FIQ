services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.12
    restart: always
    environment:
      - ETCD_NAME=etcd-${NODE_ID}
      - ETCD_DATA_DIR=/etcd-data
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://${NODE_IP}:2380
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://${NODE_IP}:2379
      - ETCD_INITIAL_CLUSTER_TOKEN=fiq-etcd-cluster
      - ETCD_INITIAL_CLUSTER=etcd-2=http://${NODE2_IP}:2380,etcd-3=http://${NODE3_IP}:2380
      - ETCD_INITIAL_CLUSTER_STATE=new
    ports:
      - "2379:2379"
      - "2380:2380"
    volumes:
      - etcd_data:/etcd-data

  patroni:
    build:
      context: .
      dockerfile: Dockerfile.patroni
    restart: always
    environment:
      - PATRONI_NAME=node-${NODE_ID}
      - PATRONI_ETCD3_HOSTS=${NODE2_IP}:2379,${NODE3_IP}:2379
      - PATRONI_POSTGRESQL_CONNECT_ADDRESS=${NODE_IP}:5432
      - PATRONI_POSTGRESQL_LISTEN=0.0.0.0:5432
      - PATRONI_RESTAPI_CONNECT_ADDRESS=${NODE_IP}:8008
      - PATRONI_RESTAPI_LISTEN=0.0.0.0:8008
      - PATRONI_SUPERUSER_PASSWORD=${POSTGRES_PASSWORD}
      - PATRONI_REPLICATION_PASSWORD=${REPLICATION_PASSWORD}
    ports:
      - "5432:5432"
      - "8008:8008"
    volumes:
      - patroni_data:/home/postgres/pgdata
      - ./patroni.yml:/patroni.yml:ro
    depends_on:
      - etcd

  haproxy:
    image: haproxy:2.8-alpine
    restart: always
    environment:
      - NODE1_IP=${NODE1_IP}
      - NODE2_IP=${NODE2_IP}
      - NODE3_IP=${NODE3_IP}
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "5000:5000" # PostgreSQL Read/Write (Master)
      - "5001:5001" # PostgreSQL Read-Only (Replicas)
      - "7000:7000" # HAProxy Stats Dashboard
    depends_on:
      - patroni

volumes:
  etcd_data:
  patroni_data:

networks:
  default:
    external: true
    name: fiq-network
